name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate rules package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run parity tests
        run: npm test

      - name: Verify generated artifacts are committed
        run: |
          if [ -n "$(git status --porcelain=v1 --untracked-files=all)" ]; then
            git status --short
            git diff -- dist
            echo "npm test changed the checkout; commit deterministic generated artifacts" >&2
            exit 1
          fi

      - name: Check npm package contents
        run: npm pack --dry-run --ignore-scripts
